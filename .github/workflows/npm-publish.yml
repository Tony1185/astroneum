name: Publish Tagged Release to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      otp:
        description: "NPM one-time password (OTP) for 2FA"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level moderate 2>&1 | true

      - name: Verify package
        run: pnpm verify

      - name: Determine npm dist-tag
        id: npm_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG=$(echo "$VERSION" | sed -E 's/^[^-]+-([^.]+).*/\1/')
          else
            DIST_TAG=latest
          fi
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: |
          OTP_FLAG=""
          if [ -n "${{ inputs.otp }}" ]; then
            OTP_FLAG="--otp=${{ inputs.otp }}"
          fi
          pnpm publish --no-git-checks --access public --tag "${{ steps.npm_tag.outputs.dist_tag }}" --provenance $OTP_FLAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
